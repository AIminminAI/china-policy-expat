<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>China Policy Guide - Know Your Benefits in China</title>
    <meta name="title" content="China Policy Guide - Know Your Benefits in China" />
    <meta name="description" content="Discover tax deductions, subsidies, housing benefits, and social insurance policies available to foreign nationals living and working in China. Free calculator and personalized policy matching." />
    <meta name="keywords" content="China policy, expat benefits, China tax deductions, foreigner social insurance, China housing subsidy, China work permit, expat China, China green card, foreign talent visa" />
    <meta name="author" content="China Policy Guide" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://china-policy-expat.vercel.app/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://china-policy-expat.vercel.app/" />
    <meta property="og:title" content="China Policy Guide - Know Your Benefits in China" />
    <meta property="og:description" content="Discover tax deductions, subsidies, housing benefits, and social insurance policies available to foreign nationals living and working in China." />
    <meta property="og:site_name" content="China Policy Guide" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://china-policy-expat.vercel.app/" />
    <meta name="twitter:title" content="China Policy Guide - Know Your Benefits in China" />
    <meta name="twitter:description" content="Discover tax deductions, subsidies, housing benefits, and social insurance policies available to foreign nationals living and working in China." />

    <!-- Google Fonts: Merriweather + Source Sans 3 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "China Policy Guide",
      "url": "https://china-policy-expat.vercel.app",
      "description": "Discover tax deductions, subsidies, housing benefits, and social insurance policies available to foreign nationals living and working in China.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://china-policy-expat.vercel.app/policies?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <script type="module">
      if (import.meta.hot?.on) {
        import.meta.hot.on('vite:error', (error) => {
          if (error.err) {
            console.error(
              [error.err.message, error.err.frame].filter(Boolean).join('\n'),
            )
          }
        })
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
